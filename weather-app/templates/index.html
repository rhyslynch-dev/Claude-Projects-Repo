<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { font-size: 1.8rem; margin-bottom: 24px; letter-spacing: 1px; }
    form { display: flex; gap: 8px; margin-bottom: 24px; }
    input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #c73652; }
    .error { color: #ff6b6b; margin-top: 8px; }
    .weather { margin-top: 8px; }
    .city { font-size: 1.6rem; font-weight: 600; }
    .condition { font-size: 1.1rem; opacity: 0.8; margin: 6px 0 20px; }
    .temp { font-size: 4rem; font-weight: 700; }
    .temp span { font-size: 1.5rem; vertical-align: super; }
    .details {
      display: flex;
      justify-content: space-around;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .detail-label { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
    .detail-value { font-size: 1.1rem; font-weight: 600; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Weather App</h1>
    <form method="POST">
      <input type="text" name="city" placeholder="Enter city name..." required>
      <button type="submit">Search</button>
    </form>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    {% if weather %}
      <div class="weather">
        <div class="city">{{ weather.city }}, {{ weather.country }}</div>
        <div class="condition">{{ weather.condition }}</div>
        <div class="temp">{{ weather.temp }}<span>°C</span></div>
        <div class="details">
          <div>
            <div class="detail-label">Humidity</div>
            <div class="detail-value">{{ weather.humidity }}%</div>
          </div>
          <div>
            <div class="detail-label">Wind</div>
            <div class="detail-value">{{ weather.wind }} km/h</div>
          </div>
        </div>
      </div>
    {% endif %}
  </div>
</body>
</html>
